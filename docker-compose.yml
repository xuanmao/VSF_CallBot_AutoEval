services:
  bridge:
    build: ./bridge
    container_name: cscallbot-bridge
    env_file: .env
    environment:
      - PORT=${BRIDGE_PORT:-8080}
    ports:
      - "${BRIDGE_PORT:-8080}:8080"
    networks:
      - cscallbot
    restart: unless-stopped

  freeswitch:
    build: ./freeswitch
    container_name: cscallbot-freeswitch
    env_file: .env
    depends_on:
      - bridge
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
    restart: unless-stopped

networks:
  cscallbot:
    driver: bridge
