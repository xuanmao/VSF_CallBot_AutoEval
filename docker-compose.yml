services:
  bridge:
    build: ./bridge
    container_name: cscallbot-bridge
    env_file: .env
    environment:
      - PORT=${BRIDGE_PORT:-8080}
    ports:
      - "${BRIDGE_PORT:-8080}:8080"
    volumes:
      - shared-audio:/shared-audio
    networks:
      - cscallbot
    extra_hosts:
      - "freeswitch-host:host-gateway"
    restart: unless-stopped

  freeswitch:
    build: ./freeswitch
    container_name: cscallbot-freeswitch
    env_file: .env
    depends_on:
      - bridge
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
      - shared-audio:/shared-audio
    restart: unless-stopped

volumes:
  shared-audio:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=256m

networks:
  cscallbot:
    driver: bridge
