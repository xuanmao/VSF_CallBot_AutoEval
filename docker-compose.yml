services:
  bridge:
    build: ./bridge
    container_name: cscallbot-bridge
    env_file: .env
    environment:
      - PORT=${BRIDGE_PORT:-8080}
    ports:
      - "${BRIDGE_PORT:-8080}:8080"
    networks:
      - cscallbot
    restart: unless-stopped

  freeswitch:
    build: ./freeswitch
    container_name: cscallbot-freeswitch
    env_file: .env
    depends_on:
      - bridge
    # Host networking is the simplest way to keep RTP working without
    # publishing the entire 16384-16484/udp range. Comment `network_mode`
    # and uncomment `ports` + `networks` if your platform doesn't support
    # host networking (e.g. Docker Desktop on macOS / Windows).
    network_mode: host
    # ports:
    #   - "5060:5060/udp"
    #   - "5060:5060/tcp"
    #   - "16384-16484:16384-16484/udp"
    # networks:
    #   - cscallbot
    volumes:
      - ./freeswitch/conf:/etc/freeswitch:ro
    restart: unless-stopped

networks:
  cscallbot:
    driver: bridge
